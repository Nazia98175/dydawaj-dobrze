    <script>
      const searchInput = document.getElementById("searchInput");
      const suggestionsList = document.getElementById("suggestionsList");
      const suggestionItems = document.querySelectorAll(".suggestion-item");

      // Position the dropdown correctly
      function positionDropdown() {
        const inputRect = searchInput.getBoundingClientRect();
        const parentRect = searchInput
          .closest("div.bg-white")
          .getBoundingClientRect();

        suggestionsList.style.width = parentRect.width + "px";
        suggestionsList.style.top = parentRect.bottom + window.scrollY + "px";
        suggestionsList.style.left = parentRect.left + "px";
      }

      // Call on page load and resize
      window.addEventListener("load", positionDropdown);
      window.addEventListener("resize", positionDropdown);

      // Hide suggestions when clicking outside
      document.addEventListener("click", (event) => {
        if (
          !searchInput.contains(event.target) &&
          !suggestionsList.contains(event.target)
        ) {
          hideDropdown();
        }
      });

      // Make each suggestion clickable
      suggestionItems.forEach((item) => {
        item.addEventListener("click", () => {
          searchInput.value = item
            .querySelector("span:first-child")
            .textContent.trim()
            .replace(" 👆", "");
          hideDropdown();
        });
      });

      // Show dropdown with animation
      function showDropdown() {
        suggestionsList.classList.remove("hidden");
        suggestionsList.classList.add("dropdown-enter");
        setTimeout(() => {
          suggestionsList.classList.add("dropdown-enter-active");
          suggestionsList.classList.remove("dropdown-enter");
        }, 10);
      }

      // Hide dropdown with animation
      function hideDropdown() {
        suggestionsList.classList.add("dropdown-exit");
        suggestionsList.classList.add("dropdown-exit-active");

        setTimeout(() => {
          suggestionsList.classList.add("hidden");
          suggestionsList.classList.remove("dropdown-exit");
          suggestionsList.classList.remove("dropdown-exit-active");
        }, 200);
      }

      // Show all suggestions when user starts typing anything
      searchInput.addEventListener("input", () => {
        const searchTerm = searchInput.value.toLowerCase();

        if (searchTerm.length === 0) {
          // Hide suggestions if search is empty
          hideDropdown();
        } else {
          // Show all suggestions as soon as user types anything
          showDropdown();
        }
      });
    </script>
